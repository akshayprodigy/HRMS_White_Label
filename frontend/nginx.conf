server {
    listen 80;
    server_name ueiplerp.co.in www.ueiplerp.co.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ueiplerp.co.in www.ueiplerp.co.in;

    ssl_certificate /etc/letsencrypt/live/ueiplerp.co.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ueiplerp.co.in/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Cache hashed build assets aggressively; never cache HTML so redeploys take effect immediately.
    location /assets/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri =404;
    }

    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri =404;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        add_header Cache-Control "no-cache" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri $uri/ /index.html;
    }

    client_max_body_size 50m;

    location /api {
        resolver 127.0.0.11 valid=30s;
        set $upstream backend;
        proxy_pass http://$upstream:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_request_buffering off;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
