<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2563EB" />
    <title>Offline — UE ERP</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; background: #F8FAFC; color: #0F172A; -webkit-font-smoothing: antialiased; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        display: flex; align-items: center; justify-content: center; padding: 32px;
      }
      .card {
        max-width: 420px; width: 100%; background: #FFFFFF; border: 1px solid #E5E7EB;
        border-radius: 20px; padding: 32px; box-shadow: 0 4px 24px rgba(15,23,42,.06); text-align: center;
      }
      .dot { display: inline-block; width: 10px; height: 10px; background: #DC2626; border-radius: 999px; vertical-align: middle; margin-right: 8px; }
      h1 { font-size: 20px; margin: 12px 0 8px; letter-spacing: -0.01em; }
      p { font-size: 14px; color: #475569; line-height: 1.55; margin: 0 0 8px; }
      .warn { margin-top: 20px; padding: 14px; background: #FEF2F2; border: 1px solid #FECACA; border-radius: 12px; font-size: 13px; color: #B91C1C; text-align: left; }
      .btn {
        margin-top: 20px; display: inline-block; padding: 12px 20px; background: #2563EB; color: #fff;
        border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 14px;
      }
      .btn:active { background: #1D4ED8; }
    </style>
  </head>
  <body>
    <div class="card">
      <div><span class="dot"></span><small style="font-weight:700;color:#DC2626;letter-spacing:.06em;text-transform:uppercase;">Offline</small></div>
      <h1>You're offline</h1>
      <p>The UE ERP app can't reach the server right now.</p>
      <div class="warn">
        <strong>Reconnect to punch.</strong> Attendance requires live GPS + a server response — we never fabricate a location or time when you're offline.
      </div>
      <a class="btn" href="/" onclick="location.reload(); return false;">Retry</a>
    </div>
  </body>
</html>
