name: erp-united-exploration-dev

services:
  db:
    image: mariadb:11
    restart: always
    environment:
      MARIADB_DATABASE: erp_db
      MARIADB_USER: erp_user
      MARIADB_PASSWORD: erp_password
      MARIADB_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    environment:
      - MARIADB_SERVER=db
      - MARIADB_USER=erp_user
      - MARIADB_PASSWORD=erp_password
      - MARIADB_DB=erp_db
      - BACKEND_CORS_ORIGINS=["http://localhost:5173", "http://localhost"]
    ports:
      - "8001:8000"
    depends_on:
      - db
    command: ["sh", "/app/scripts/dev_start.sh"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mariadb_data:
  uploads_data:
