services:
  db:
    image: mariadb:11
    restart: always
    environment:
      MARIADB_DATABASE: ${DB_NAME:-erp_db}
      MARIADB_USER: ${DB_USER:-erp_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-erp_password}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    volumes:
      - mariadb_prod_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    volumes:
      - uploads_prod_data:/app/uploads
    environment:
      - MARIADB_SERVER=db
      - MARIADB_USER=${DB_USER:-erp_user}
      - MARIADB_PASSWORD=${DB_PASSWORD:-erp_password}
      - MARIADB_DB=${DB_NAME:-erp_db}
      - SECRET_KEY=${SECRET_KEY}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-["http://localhost"]}
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend

volumes:
  mariadb_prod_data:
  uploads_prod_data:
